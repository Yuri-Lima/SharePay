<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SharePay</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Bootstrap CDN for visual parity with original Django templates (tables, masthead, buttons) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    /* Replicate original masthead + clean modern styling */
    .masthead { position: relative; min-height: 100vh; padding-top: 3rem; background: linear-gradient(135deg, #212529 0%, #343a40 100%); color: #fff; }
    .masthead-bg { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.35); }
    .masthead-content { position: relative; z-index: 1; max-width: 720px; }
    .table { font-size: 0.95rem; }
    .table caption { caption-side: top; font-weight: 600; color: #212529; }
    .navbar-brand { font-weight: 700; letter-spacing: .5px; }
    .btn { border-radius: .375rem; }
    .card { box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,.075); }
    .left-over { background: #f8d7da; }
    .section-title { font-size: 1.1rem; font-weight: 600; margin: 1rem 0 .5rem; }
    .form-section { background: #f8f9fa; padding: 1rem; border-radius: .5rem; margin-bottom: 1rem; }
    .report-table th { background: #212529; color: #fff; }
  </style>
</head>
<body>
  <sp-root></sp-root>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
